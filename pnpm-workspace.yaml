packages:
  - .

allowBuilds:
  '@google/genai': false
  '@whiskeysockets/baileys': true
  bufferutil: true
  electron: true
  electron-winstaller: true
  esbuild: true
  protobufjs: true
  sharp: true
  wechat-kf-relay: true

minimumReleaseAgeExclude:
  - '@earendil-works/pi-agent-core@0.80.8'
  - '@earendil-works/pi-ai@0.80.8'
  - '@earendil-works/pi-coding-agent@0.80.8'
  - '@earendil-works/pi-tui@0.80.8'

onlyBuiltDependencies:
  - wechat-kf-relay

supportedArchitectures:
  cpu: [ current, x64, arm64 ]
  os: [ current, darwin, win32 ]
