name: Build Mac Intel

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build and upload Intel assets for
        required: false
        type: string

permissions:
  contents: write

jobs:
  mac_intel:
    name: macOS Intel
    runs-on: macos-15-intel

    steps:
      - name: Checkout code (manual)
        uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag == ''
        with:
          fetch-depth: 0

      - name: Checkout code (manual tag)
        uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        with:
          ref: refs/tags/${{ github.event.inputs.release_tag }}
          fetch-depth: 0

      - name: Checkout code (tag)
        uses: actions/checkout@v4
        if: github.event_name == 'push'
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Verify Intel libsql binding
        run: pnpm run verify:libsql-bindings -- --x64

      - name: Import Code Signing Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATE_BASE64" ]; then
            exit 0
          fi

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build Intel macOS artifacts
        run: |
          pnpm run build
          node ./scripts/run-electron-builder.mjs --mac --x64 --publish never

      - name: Upload Intel release assets
        if: github.event_name == 'push' || github.event.inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME}"
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          fi

          RELEASE_VERSION="${RELEASE_TAG#v}"
          VERSION="${RELEASE_VERSION#v}"
          cp "dist/TIA Studio-${VERSION}-mac.zip" "dist/TIA-Studio-${VERSION}-x64-mac.zip"
          gh release upload "$RELEASE_TAG" \
            "dist/tia-studio-${VERSION}-x64.dmg" \
            "dist/TIA-Studio-${VERSION}-x64-mac.zip" \
            --clobber

      - name: Upload Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-build
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
          if-no-files-found: error

      - name: Cleanup Keychain
        if: always()
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
        run: |
          if [ -z "$CERTIFICATE_BASE64" ]; then
            exit 0
          fi

          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
