name: Build and Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.name }})
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch || '', 'v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Publish both macOS architectures from one job so updater metadata
          # stays in sync without shipping a larger universal app.
          - name: macOS
            os: macos-latest
            is_macos: true
          - name: Windows
            os: windows-latest
            is_macos: false

    env:
      RELEASE_TAG: ${{ github.event.workflow_run.head_branch }}
      GITHUB_REF: refs/tags/${{ github.event.workflow_run.head_branch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify macOS libsql bindings
        if: matrix.is_macos
        run: pnpm run verify:libsql-bindings -- --mac

      - name: Verify Windows libsql bindings
        if: ${{ !matrix.is_macos }}
        run: pnpm run verify:libsql-bindings -- --win

      - name: Import Code Signing Certificate (macOS)
        if: matrix.is_macos
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Build and release (macOS)
        if: matrix.is_macos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          pnpm run build
          pnpm run verify:libsql-bindings -- --x64
          node ./scripts/run-electron-builder.mjs --mac --x64 --publish always
          pnpm run verify:libsql-bindings -- --arm64
          node ./scripts/run-electron-builder.mjs --mac --arm64 --publish always

      - name: Build and release
        if: ${{ !matrix.is_macos }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          pnpm run build
          pnpm run verify:libsql-bindings -- --win
          node ./scripts/run-electron-builder.mjs --publish always

      - name: Cleanup Keychain (macOS)
        if: matrix.is_macos && always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  release_notes:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch || '', 'v')
    needs: release
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event.workflow_run.head_branch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Apply release notes if provided
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES_FILE="releases/${RELEASE_TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            gh release edit "$RELEASE_TAG" --title "${RELEASE_TAG#v}" --notes-file "$NOTES_FILE"
          fi
